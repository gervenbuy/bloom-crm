<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>元序健康調理中心 — 療程管理系統</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="style.css"/>
</head>
<body>
<div class="surface-pattern" aria-hidden="true"></div>
<div class="layout">

  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="sidebar-logo">
      <div class="sidebar-logo-icon">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3c-4.97 0-9 4.03-9 9s4.03 9 9 9 9-4.03 9-9"/><path d="M12 3c2.76 0 5 4.03 5 9s-2.24 9-5 9"/><path d="M3 12h18"/><path d="M12 3c-2.76 0-5 4.03-5 9s2.24 9 5 9"/></svg>
      </div>
      <div class="sidebar-title">元序健康 CRM</div>
      <div class="sidebar-subtitle">療程堂數管理系統</div>
    </div>
    <nav class="sidebar-nav">
      <div class="nav-section-label">主選單</div>
      <button class="nav-item active" data-page="dashboard" onclick="navigate('dashboard')">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
        總覽儀表板
        <span class="nav-badge" id="nav-notif-badge" style="display:none">0</span>
      </button>
      <button class="nav-item" data-page="customers" onclick="navigate('customers')">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
        客戶管理
      </button>
      <button class="nav-item" data-page="intakes" onclick="navigate('intakes')">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
        新進病歷
        <span class="nav-badge" id="nav-intake-badge" style="display:none">0</span>
      </button>
    </nav>
    <div class="sidebar-footer">元序健康 CRM &copy; 2026</div>
  </aside>

  <!-- Main -->
  <main class="main" id="main">
    <div class="main-header">
      <div>
        <div class="breadcrumb" id="breadcrumb">主頁</div>
        <h1 class="main-title" id="main-title"><span>總覽</span> 儀表板</h1>
      </div>
      <div class="header-right">
        <div class="date-chip">
          <svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
          <span id="today-date"></span>
        </div>
        <div class="icon-btn" title="通知">
          <span class="notif-dot" id="notif-dot" style="display:none"></span>
          <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
        </div>
        <a href="intake-form.html" target="_blank" class="btn btn-sm" style="text-decoration:none">
          <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
          病歷表單連結
        </a>
        <button class="btn btn-primary btn-sm" onclick="openModal('add-customer')">
          <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          新增客戶
        </button>
      </div>
    </div>
    <div class="page-content">
      <div class="page active" id="page-dashboard"></div>
      <div class="page" id="page-customers"></div>
      <div class="page" id="page-profile"></div>
      <div class="page" id="page-intakes"></div>
    </div>
  </main>
</div>

<!-- Add Customer Modal -->
<div class="modal-overlay" id="modal-add-customer" style="display:none" onclick="closeModalOutside(event,'modal-add-customer')">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title">新增客戶檔案</span>
      <button class="icon-btn" onclick="closeModal('add-customer')">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <form id="form-add-customer" onsubmit="handleAddCustomer(event)">
      <div class="modal-body">
        <div class="form-grid-2">
          <div class="form-group"><label class="form-label">姓名 *</label><input name="name" required class="form-input" placeholder="王大明"/></div>
          <div class="form-group"><label class="form-label">手機號碼 *</label><input name="phone" required class="form-input" placeholder="0912-345-678"/></div>
        </div>
        <div class="form-grid-2">
          <div class="form-group"><label class="form-label">生日</label><input name="birthday" type="date" class="form-input"/></div>
          <div class="form-group"><label class="form-label">性別</label><select name="gender" class="form-input form-select"><option>女</option><option>男</option><option>其他</option></select></div>
        </div>
        <div class="form-group"><label class="form-label">健康狀況 / 備註</label><textarea name="notes" class="form-input form-textarea" placeholder="過敏、傷病史、偏好力道..."></textarea></div>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn" onclick="closeModal('add-customer')">取消</button>
        <button type="submit" class="btn btn-primary">建立檔案</button>
      </div>
    </form>
  </div>
</div>

<!-- Transaction Modal -->
<div class="modal-overlay" id="modal-transaction" style="display:none" onclick="closeModalOutside(event,'modal-transaction')">
  <div class="modal">
    <div class="modal-header">
      <div><div class="modal-title" id="tx-modal-title">儲值</div><div class="modal-subtitle" id="tx-modal-subtitle"></div></div>
      <button class="icon-btn" onclick="closeModal('transaction')">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <form id="form-transaction" onsubmit="handleTransaction(event)">
      <div class="modal-body">
        <div class="alert alert-amber" id="tx-balance-alert" style="display:none">
          <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
          <span id="tx-balance-text"></span>
        </div>
        <div id="tx-plan-section" class="form-group">
          <label class="form-label">快速選擇方案</label>
          <div class="plan-grid" id="plan-grid"></div>
        </div>
        <div class="form-grid-2" id="tx-fields">
          <div class="form-group"><label class="form-label" id="tx-sessions-label">增加堂數 *</label><input name="sessions" id="tx-sessions" required type="number" min="1" value="1" class="form-input"/></div>
          <div class="form-group" id="tx-amount-group"><label class="form-label">收款金額 (NT$) *</label><input name="amount" id="tx-amount" required type="number" min="0" class="form-input" placeholder="例：6500"/><div class="form-hint">可自訂覆蓋方案定價</div></div>
        </div>
        <div class="form-group"><label class="form-label">備註 / 療程名稱 *</label><input name="note" id="tx-note" required class="form-input" placeholder=""/></div>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn" onclick="closeModal('transaction')">取消</button>
        <button type="submit" class="btn btn-primary" id="tx-submit-btn">確認</button>
      </div>
    </form>
  </div>
</div>

<!-- Share Points Modal -->
<div class="modal-overlay" id="modal-share" style="display:none" onclick="closeModalOutside(event,'modal-share')">
  <div class="modal">
    <div class="modal-header">
      <div><div class="modal-title">分享堂數給親友</div><div class="modal-subtitle" id="share-modal-subtitle"></div></div>
      <button class="icon-btn" onclick="closeModal('share')">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <div class="modal-body">
      <!-- Tab -->
      <div style="display:flex;gap:0;border:0.5px solid var(--border);border-radius:var(--border-radius-md);overflow:hidden;margin-bottom:16px">
        <button class="share-tab active" id="tab-phone" onclick="switchShareTab('phone')" style="flex:1;padding:8px;border:none;background:var(--color-background-info);color:var(--color-text-info);font-size:13px;cursor:pointer;font-family:var(--font-body)">轉贈給指定電話</button>
        <button class="share-tab" id="tab-code" onclick="switchShareTab('code')" style="flex:1;padding:8px;border:none;background:var(--color-background-secondary);color:var(--color-text-secondary);font-size:13px;cursor:pointer;font-family:var(--font-body)">產生分享碼</button>
      </div>
      <!-- Phone tab -->
      <div id="share-phone-panel">
        <form id="form-share-phone" onsubmit="handleSharePhone(event)">
          <div class="form-group"><label class="form-label">對方手機號碼 *</label><input name="toPhone" required class="form-input" placeholder="0912-345-678" id="share-to-phone"/></div>
          <div class="form-group"><label class="form-label">轉贈堂數 *</label><input name="shareAmt" required type="number" min="1" class="form-input" id="share-amount" placeholder="1"/><div class="form-hint" id="share-balance-hint"></div></div>
          <div class="form-group"><label class="form-label">留言（選填）</label><input name="shareMsg" class="form-input" placeholder="送給你的，好好保重！"/></div>
          <div class="modal-footer" style="padding:0;border:none;margin-top:4px">
            <button type="button" class="btn" onclick="closeModal('share')">取消</button>
            <button type="submit" class="btn btn-primary">確認轉贈</button>
          </div>
        </form>
      </div>
      <!-- Code tab -->
      <div id="share-code-panel" style="display:none">
        <div class="form-group"><label class="form-label">產生幾堂的分享碼</label><input type="number" min="1" class="form-input" id="code-amount" placeholder="1"/></div>
        <button class="btn btn-primary" style="width:100%;margin-bottom:12px" onclick="generateShareCode()">產生分享碼</button>
        <div id="share-code-result" style="display:none">
          <div style="background:var(--color-background-secondary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-md);padding:16px;text-align:center;margin-bottom:12px">
            <div style="font-size:11px;color:var(--color-text-secondary);margin-bottom:8px;text-transform:uppercase;letter-spacing:0.05em">分享碼</div>
            <div style="font-size:28px;font-weight:600;letter-spacing:0.15em;color:var(--color-text-primary)" id="gen-code">------</div>
            <div style="font-size:11px;color:var(--color-text-secondary);margin-top:6px" id="gen-code-info"></div>
          </div>
          <div style="font-size:12px;color:var(--color-text-secondary);line-height:1.6">將此分享碼傳給對方，對方在系統輸入後即可兌換堂數。分享碼 48 小時內有效，每組只能使用一次。</div>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Redeem Code Modal -->
<div class="modal-overlay" id="modal-redeem" style="display:none" onclick="closeModalOutside(event,'modal-redeem')">
  <div class="modal">
    <div class="modal-header">
      <div><div class="modal-title">兌換分享碼</div><div class="modal-subtitle" id="redeem-subtitle"></div></div>
      <button class="icon-btn" onclick="closeModal('redeem')">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <form id="form-redeem" onsubmit="handleRedeem(event)">
      <div class="modal-body">
        <div class="form-group"><label class="form-label">輸入分享碼</label><input name="code" required class="form-input" placeholder="例：A3K9XZ" id="redeem-code-input" style="text-transform:uppercase;letter-spacing:0.1em;font-size:18px;text-align:center"/></div>
        <div id="redeem-result" style="display:none"></div>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn" onclick="closeModal('redeem')">取消</button>
        <button type="submit" class="btn btn-primary">兌換</button>
      </div>
    </form>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast" style="display:none"><div class="toast-dot"></div><span id="toast-msg"></span></div>

<script src="app.js"></script>
</body>
</html>
